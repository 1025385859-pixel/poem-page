<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>宿新市徐公店 · 四关闯关打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}

@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(245,166,35,.35)}50%{box-shadow:0 0 26px rgba(245,166,35,.75)}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(85vh) rotate(720deg);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shineSweep{0%{left:-120%}100%{left:120%}}
@keyframes rankEntry{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.45)}70%{box-shadow:0 0 0 14px rgba(231,76,60,0)}}
@keyframes waveBar{0%,100%{height:7px}50%{height:22px}}
@keyframes recordingRing{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.2);opacity:0}}
@keyframes starPop{0%{transform:scale(0) rotate(-25deg);opacity:0}65%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes butterFly{0%,100%{transform:translate(0,0) rotate(0)}30%{transform:translate(10px,-12px) rotate(12deg)}70%{transform:translate(-6px,6px) rotate(-8deg)}}
@keyframes videoPop{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes checkmark{0%{stroke-dashoffset:50}100%{stroke-dashoffset:0}}
@keyframes progressPulse{0%,100%{opacity:1}50%{opacity:.7}}

:root{
  --bg:#fffbf0; --card:#fff; --primary:#c67c00; --pri-light:#fff8e7;
  --accent:#e74c3c; --yellow:#f5a623; --green:#2ea05a; --grn-light:#f0fff4;
  --red:#e53e3e; --text:#1a1a2e; --text2:#6b7280; --border:#fde9b8;
  --shadow:0 2px 16px rgba(0,0,0,.08); --gold:#f6c90e;
  --r:16px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body{
  font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  overflow-x:hidden; padding-bottom:calc(20px + var(--safe-bottom));
}

/* ===== 欢迎屏 ===== */
#welcome{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  background:linear-gradient(165deg,#124a28 0%,#1f7a42 40%,#5daa68 80%,#a8d88a 100%);
  padding:env(safe-area-inset-top,20px) 16px 24px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.w-scene{width:100%;max-width:400px;margin:10px auto 0;flex-shrink:0}
.w-icon{font-size:44px;animation:bounceIn .7s ease .2s both;margin:6px 0 2px;text-align:center}
.w-title{font-size:clamp(24px,7vw,38px);font-weight:900;color:#fff;text-align:center;
  letter-spacing:3px;text-shadow:0 2px 10px rgba(0,0,0,.3);animation:fadeIn .7s ease .3s both}
.w-title em{color:#ffd700;font-style:normal}
.w-sub{font-size:13px;color:rgba(255,255,255,.78);text-align:center;margin:4px 0 14px;
  animation:fadeIn .7s ease .5s both}

/* 名字输入 */
.name-box{
  background:rgba(255,255,255,.13);backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,255,255,.25);border-radius:18px;
  padding:16px 18px;width:100%;max-width:400px;
  animation:fadeIn .7s ease .7s both;text-align:center;margin-bottom:12px;
}
.name-box .nb-label{color:#ffd700;font-size:14px;font-weight:700;margin-bottom:10px}
.name-row{display:flex;gap:9px;justify-content:center}
.name-inp{
  flex:1;max-width:160px;background:rgba(255,255,255,.92);
  border:2px solid transparent;border-radius:12px;padding:10px 14px;
  font-size:16px;font-weight:700;color:var(--text);outline:none;
  text-align:center;font-family:inherit;transition:border-color .2s;
}
.name-inp:focus{border-color:#ffd700}
.name-inp.err{border-color:#ff5252;animation:shake .4s}
.name-ok-btn{
  background:linear-gradient(135deg,#ffd700,#f5a623);color:#124a28;
  border:none;padding:10px 18px;font-size:15px;font-weight:800;
  border-radius:12px;cursor:pointer;white-space:nowrap;
}

/* 关卡预览 */
.w-levels{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  max-width:420px;width:100%;margin-bottom:14px;animation:fadeIn .7s ease .9s both}
.w-lv{
  background:rgba(255,255,255,.11);border:1.5px solid rgba(255,255,255,.2);
  border-radius:13px;padding:9px 13px;text-align:center;min-width:72px;
  flex:1;max-width:90px;
}
.w-lv .lv-icon{font-size:22px;display:block;animation:float 3s ease-in-out infinite}
.w-lv:nth-child(2) .lv-icon{animation-delay:.2s}
.w-lv:nth-child(3) .lv-icon{animation-delay:.4s}
.w-lv:nth-child(4) .lv-icon{animation-delay:.6s}
.w-lv .lv-name{font-size:10px;color:rgba(255,255,255,.68);margin-top:3px}

.start-btn{
  background:linear-gradient(135deg,#ffd700,#f5a623);color:#124a28;
  border:none;padding:15px 52px;font-size:18px;font-weight:900;
  border-radius:40px;cursor:pointer;letter-spacing:2px;
  animation:glow 2.5s infinite,fadeIn .7s ease 1.1s both;
  position:relative;overflow:hidden;
}
.start-btn::after{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  animation:shineSweep 3s infinite}

/* 欢迎屏诗句展示 */
.w-poem{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:14px;padding:12px 16px;max-width:400px;width:100%;
  margin-bottom:12px;animation:fadeIn .7s ease .6s both;
}
.w-poem h4{color:#ffd700;font-size:12px;font-weight:700;margin-bottom:8px;text-align:center}
.w-poem p{color:rgba(255,255,255,.9);font-size:16px;text-align:center;
  letter-spacing:4px;line-height:1.9}
.w-poem p:nth-child(2n){color:#b8f5a0}

/* ===== 游戏主区 ===== */
#game{display:none;max-width:640px;margin:0 auto;padding:12px 14px}

.g-header{text-align:center;margin-bottom:12px}
.g-header h1{font-size:clamp(16px,4.5vw,22px);font-weight:900;color:var(--primary)}
.g-header h1 span{color:var(--accent)}
.player-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--pri-light);border:1.5px solid rgba(198,124,0,.2);
  border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;
  color:var(--primary);margin-top:5px;
}

/* 关卡标签 — 横向滚动，手机友好 */
.tabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;margin-bottom:12px;padding-bottom:2px}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:7px;white-space:nowrap;justify-content:center;min-width:max-content;margin:0 auto}
.tab{
  padding:7px 14px;border-radius:22px;cursor:pointer;font-size:12px;font-weight:700;
  border:2px solid var(--border);background:var(--card);color:var(--text2);
  transition:all .25s;position:relative;flex-shrink:0;
}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary);
  box-shadow:0 3px 10px rgba(198,124,0,.3)}
.tab.done{background:var(--grn-light);border-color:var(--green);color:var(--green)}
.tab.locked{opacity:.4;cursor:not-allowed}
.tab .t-check{
  position:absolute;top:-5px;right:-5px;width:16px;height:16px;
  background:var(--green);border-radius:50%;color:#fff;font-size:10px;
  display:flex;align-items:center;justify-content:center;font-weight:700;
  animation:bounceIn .4s;
}

/* 总进度 */
.prog-bar{background:var(--border);border-radius:6px;height:8px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--primary),var(--accent));
  transition:width .5s;position:relative}
.prog-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:shineSweep 2s infinite}
.prog-text{font-size:11px;color:var(--text2);text-align:right;margin-bottom:10px}

/* ===== 卡片基础 ===== */
.card{
  background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:18px;margin-bottom:12px;animation:slideUp .35s ease;
  border:1px solid var(--border);
}
.card .q-no{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:6px}
.card .q-txt{font-size:clamp(15px,4vw,18px);font-weight:800;color:var(--text);
  line-height:1.55;margin-bottom:14px}

/* ===== 关卡一：视频观看 ===== */
.video-wrap{
  border-radius:14px;overflow:hidden;background:#000;
  margin:0 0 14px;position:relative;
  box-shadow:0 4px 20px rgba(0,0,0,.2);animation:videoPop .5s ease;
}
.video-wrap video{width:100%;display:block;max-height:280px;object-fit:contain;background:#000}
.video-badge{
  position:absolute;top:10px;right:10px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
  color:#ffd700;font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;
  border:1px solid rgba(255,215,0,.3);
}
.video-progress-bar{height:4px;background:rgba(255,255,255,.2);position:relative}
.video-progress-fill{height:100%;background:linear-gradient(90deg,#ffd700,#f5a623);width:0%;transition:width .5s}

.video-tip{
  background:linear-gradient(135deg,#fff8e7,#fff);border:1.5px dashed var(--yellow);
  border-radius:12px;padding:12px 14px;font-size:13px;color:var(--primary);
  margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;
}
.video-tip .vt-icon{font-size:18px;flex-shrink:0}

/* 视频观看确认按钮 */
.watch-check-area{text-align:center;padding:4px 0 6px}
.watch-check-btn{
  background:linear-gradient(135deg,var(--primary),#e67e00);color:#fff;
  border:none;padding:13px 36px;font-size:16px;font-weight:800;
  border-radius:40px;cursor:pointer;transition:all .3s;letter-spacing:1px;
  position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(198,124,0,.35);
}
.watch-check-btn:active{transform:scale(.97)}
.watch-check-btn:disabled{background:#ccc;box-shadow:none;cursor:not-allowed}
.watch-check-btn::after{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:shineSweep 3s infinite}

/* 视频确认后的奖励提示 */
.watch-reward{
  display:none;background:linear-gradient(135deg,var(--grn-light),#fff);
  border:2px solid var(--green);border-radius:14px;padding:16px;
  text-align:center;animation:bounceIn .5s;
}
.watch-reward.show{display:block}
.watch-reward .wr-icon{font-size:40px;display:block;margin-bottom:6px}
.watch-reward h3{font-size:16px;font-weight:800;color:var(--green);margin-bottom:4px}
.watch-reward p{font-size:13px;color:var(--text2)}

/* ===== 关卡二：朗读跟读 ===== */
.read-poem-bg{
  background:linear-gradient(135deg,#124a28,#1f7a42);
  border-radius:14px;padding:16px;margin:10px 0 14px;text-align:center;
}
.read-poem-bg .rp-label{color:#ffd700;font-size:12px;font-weight:700;margin-bottom:8px}
.read-poem-bg .rp-lines{color:#fff;font-size:clamp(16px,4vw,20px);
  line-height:2;letter-spacing:3px}
.read-poem-bg .rp-lines span:nth-child(2n){color:#b8f5a0;display:block}
.read-poem-bg .rp-lines span:nth-child(2n+1){display:block}
.read-poem-bg .rp-author{color:rgba(255,255,255,.55);font-size:11px;margin-top:8px}

.read-tip-banner{
  background:linear-gradient(135deg,#e8f5e9,#f0fff4);border:1.5px solid #b2dfdb;
  border-radius:12px;padding:11px 14px;font-size:12px;color:#1a5c30;
  margin-bottom:12px;line-height:1.6;
}
.read-tip-banner strong{color:var(--primary)}

.read-tasks{display:flex;flex-direction:column;gap:11px}
.r-task{
  background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:14px;display:flex;align-items:center;gap:12px;transition:all .3s;
}
.r-task.active-task{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(245,166,35,.12)}
.r-task.done-task{border-color:var(--green);background:var(--grn-light)}
.r-num{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--primary);
  background:var(--pri-light);color:var(--primary);font-weight:900;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;
}
.r-task.done-task .r-num{background:var(--green);border-color:var(--green);color:#fff}
.r-info{flex:1;min-width:0}
.r-info h4{font-size:14px;font-weight:800;margin-bottom:2px}
.r-info p{font-size:11px;color:var(--text2);margin-bottom:4px}
.r-lines{font-size:13px;color:#444;letter-spacing:2px;line-height:1.7}
.r-star-result{font-size:16px;letter-spacing:2px;margin-top:5px}
.r-star-result span{font-size:12px;color:var(--primary);font-weight:700;margin-left:4px}
.r-timer{font-size:20px;font-weight:900;color:var(--accent);display:none;margin-top:4px}
.r-waves{display:none;gap:3px;align-items:flex-end;height:26px;margin-top:4px}
.r-waves.on{display:flex}
.r-wave{width:4px;background:var(--accent);border-radius:3px;animation:waveBar .55s ease-in-out infinite}
.r-wave:nth-child(2){animation-delay:.1s}
.r-wave:nth-child(3){animation-delay:.2s}
.r-wave:nth-child(4){animation-delay:.3s}
.r-wave:nth-child(5){animation-delay:.4s}
.r-action{flex-shrink:0}
.mic-btn{
  width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;
  font-size:22px;display:flex;align-items:center;justify-content:center;
  transition:all .3s;position:relative;
}
.mic-btn.idle{background:linear-gradient(135deg,var(--primary),#e67e00);color:#fff;
  box-shadow:0 3px 10px rgba(198,124,0,.3)}
.mic-btn.idle:active{transform:scale(.93)}
.mic-btn.rec{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;
  animation:micPulse 1.2s infinite}
.mic-btn.done{background:linear-gradient(135deg,var(--green),#27ae60);color:#fff}
.mic-ring{position:absolute;inset:0;border-radius:50%;border:3px solid #e74c3c;
  animation:recordingRing 1.1s infinite}

/* ===== 关卡三：判断题 ===== */
.judge-opts{display:flex;gap:10px;margin-top:12px}
.j-btn{
  flex:1;padding:16px 8px;border:3px solid var(--border);border-radius:14px;
  cursor:pointer;text-align:center;background:var(--card);transition:all .25s;
}
.j-btn:active{transform:scale(.95)}
.j-btn .j-emoji{font-size:30px;display:block;margin-bottom:4px}
.j-btn .j-text{font-size:13px;font-weight:700;color:var(--text2)}
.j-btn.correct-ans{background:var(--grn-light);border-color:var(--green);animation:bounceIn .4s}
.j-btn.wrong-ans{background:#fff0f0;border-color:var(--red);animation:shake .4s}
.j-btn.reveal{background:linear-gradient(135deg,#f0fff4,var(--grn-light));
  border-color:var(--green);box-shadow:0 0 0 3px rgba(46,160,90,.15)}
.j-result{
  display:none;margin-top:10px;padding:12px 14px;border-radius:12px;
  font-size:13px;font-weight:600;line-height:1.55;animation:slideUp .3s;
}
.j-result.show{display:block}
.j-result.ok{background:var(--grn-light);border:1.5px solid var(--green);color:#145a2e}
.j-result.fail{background:#fff0f0;border:1.5px solid var(--red);color:#7f0000}
.j-result .ri{font-size:16px;margin-right:5px}

/* ===== 关卡四：选择题 ===== */
.choice-opts{display:flex;flex-direction:column;gap:9px;margin-top:12px}
.c-opt{
  padding:12px 14px;border:2.5px solid var(--border);border-radius:13px;
  cursor:pointer;font-size:14px;font-weight:600;color:var(--text);
  background:var(--card);display:flex;align-items:center;gap:10px;
  transition:all .22s;
}
.c-opt:active{transform:scale(.98)}
.c-opt:hover{border-color:var(--yellow);background:var(--pri-light)}
.c-key{
  width:28px;height:28px;border-radius:50%;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-weight:900;
  font-size:13px;color:var(--text2);flex-shrink:0;transition:all .22s;
}
.c-opt:hover .c-key{background:var(--yellow);color:#fff}
.c-opt.correct{background:var(--grn-light);border-color:var(--green)}
.c-opt.correct .c-key{background:var(--green);color:#fff}
.c-opt.wrong{background:#fff0f0;border-color:var(--red)}
.c-opt.wrong .c-key{background:var(--red);color:#fff}
.c-opt.reveal-c{background:linear-gradient(135deg,#f0fff4,var(--grn-light));
  border-color:var(--green);animation:glow 1s ease 1}

/* ===== 关卡完成卡 ===== */
.lv-clear{
  display:none;background:linear-gradient(135deg,#fff8e7,var(--card));
  border:3px solid var(--yellow);border-radius:20px;padding:24px;
  text-align:center;margin-top:12px;animation:bounceIn .5s;
}
.lv-clear.show{display:block}
.lv-clear .lc-icon{font-size:48px;animation:float 2s ease-in-out infinite;display:block;margin-bottom:10px}
.lv-clear h2{font-size:clamp(18px,4.5vw,24px);font-weight:900;color:var(--primary);margin-bottom:4px}
.lv-clear .lc-stars{font-size:28px;letter-spacing:4px;margin:8px 0}
.lv-clear .lc-score{font-size:26px;font-weight:900;color:var(--accent);margin:4px 0 10px}
.lv-clear p{font-size:13px;color:var(--text2);margin-bottom:14px}
.next-btn{
  background:linear-gradient(135deg,var(--primary),#e67e00);color:#fff;
  border:none;padding:12px 32px;font-size:15px;font-weight:800;
  border-radius:40px;cursor:pointer;letter-spacing:1px;
  position:relative;overflow:hidden;
}
.next-btn:active{transform:scale(.96)}
.next-btn::after{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:shineSweep 2.5s infinite}

/* 飘分 */
.float-score{
  position:fixed;pointer-events:none;font-size:20px;font-weight:900;
  color:var(--green);z-index:9999;animation:confetti 1.1s ease forwards;
  text-shadow:0 2px 6px rgba(0,0,0,.12);
}
.float-score.neg{color:var(--red)}

/* ===== 完成屏 ===== */
#finish{display:none;max-width:640px;margin:0 auto;padding:12px 14px}
.fin-hero{
  background:linear-gradient(135deg,#124a28,#1f7a42,#5daa68);
  border-radius:20px;padding:28px 16px;text-align:center;color:#fff;
  margin-bottom:14px;position:relative;overflow:hidden;
}
.fin-hero::before{content:'🌸 🦋 🌼 🦋 🌸';font-size:14px;position:absolute;
  top:8px;left:0;right:0;opacity:.35;letter-spacing:4px;text-align:center}
.fin-butterfly{font-size:54px;animation:float 2.5s ease-in-out infinite,bounceIn .6s ease;display:block}
.fin-hero h1{font-size:clamp(22px,5.5vw,32px);font-weight:900;margin:8px 0 4px;
  text-shadow:0 2px 8px rgba(0,0,0,.25)}
.fin-score{font-size:clamp(42px,8vw,60px);font-weight:900;color:#ffd700;line-height:1;
  text-shadow:0 3px 12px rgba(0,0,0,.2)}
.fin-stars{font-size:26px;margin:6px 0;letter-spacing:5px}
.fin-msg{font-size:13px;color:rgba(255,255,255,.8);margin-top:4px}

.fin-breakdown{background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.fin-breakdown h3{font-size:14px;font-weight:800;color:var(--primary);
  margin-bottom:10px;text-align:center}
.bd-row{display:flex;justify-content:space-between;align-items:center;

<script>
/* ==============================
   全局状态
   ============================== */
let playerName = '';
let curLv = 0;
let lvScores = [0,0,0,0];
let lvDone = [false,false,false,false];

// 关卡2（朗读）状态
const READ_TASKS = [
  {title:'完整朗读全诗',desc:'朗读全诗，注意断句节奏',lines:'篱落疏疏一径深，树头花落未成阴。\n儿童急走追黄蝶，飞入菜花无处寻。',time:20},
  {title:'跟读前两句',desc:'"篱落疏疏"要读出空旷感',lines:'篱落疏疏一径深，\n树头花落未成阴。',time:15},
  {title:'跟读后两句',desc:'读出"急走"追蝶的活泼劲儿',lines:'儿童急走追黄蝶，\n飞入菜花无处寻。',time:15}
];
let rdDone = [false,false,false];
let rdRec = [-1,-1,-1];   // -1未开始 0录音中 1完成
let rdTimers = [null,null,null];
let rdLeft = [0,0,0];
let rdStars = [0,0,0];

// 关卡3（判断）状态
const JUDGE_QS = [
  {q:'《宿新市徐公店》是宋朝诗人杨万里写的。',ans:true,exp:'正确！杨万里是宋朝诗人，写了许多描写自然美景的诗。'},
  {q:'"篱落疏疏"说明篱笆很稀疏，有间隙，不是密密实实的。',ans:true,exp:'正确！"疏疏"就是稀稀落落的意思，篱笆间距宽。'},
  {q:'"树头花落未成阴"说明树叶已经茂盛，能遮住太阳了。',ans:false,exp:'错误！"未成阴"是说叶子还没长茂密，还不能遮阳，正是初春。'},
  {q:'诗中儿童追的是一只红色的蝴蝶。',ans:false,exp:'错误！诗里是"追黄蝶"，是黄色的蝴蝶哦。'},
  {q:'"飞入菜花无处寻"——黄蝴蝶飞进黄色菜花里，颜色一样，找不到了。',ans:true,exp:'正确！这就是这首诗最有趣的地方，颜色相近所以找不到了。'},
  {q:'这首诗描写的是秋天的田园风光。',ans:false,exp:'错误！这首诗写的是初春景色，从花落、蝴蝶可以看出。'},
  {q:'"儿童急走"中"走"在古文里是"跑"的意思，不是慢慢走路。',ans:true,exp:'正确！古代"走"是奔跑的意思，这里说孩子飞奔追蝴蝶。'},
  {q:'这首诗表达了作者对春天田园美景和儿童乐趣的喜爱。',ans:true,exp:'正确！诗人用生动的笔墨描绘了春天田园和追蝶趣事。'}
];
let jdIdx = 0, jdScore = 0, jdAns = false;

// 关卡4（选择）状态
const CHOICE_QS = [
  {q:'《宿新市徐公店》的作者是谁？',opts:['范成大','杨万里','苏轼','白居易'],ans:1,exp:'杨万里是宋朝诗人，被称为"诚斋先生"。'},
  {q:'"篱落疏疏一径深"中"一径"是什么意思？',opts:['一棵大树','一片草地','一条小路','一面墙'],ans:2,exp:'"径"就是小路，"一径深"指一条幽深的小路向前延伸。'},
  {q:'诗中小孩追的蝴蝶是什么颜色的？',opts:['白色','红色','黄色','蓝色'],ans:2,exp:'"追黄蝶"——是黄色的蝴蝶。'},
  {q:'"树头花落未成阴"表现了哪个季节？',opts:['秋天，叶落','冬天，枯枝','初春，叶刚萌','盛夏，烈日'],ans:2,exp:'"未成阴"说明叶子还没长茂密，正是花落叶发的初春时节。'},
  {q:'蝴蝶飞进哪里，让小孩找不到了？',opts:['树林深处','篱笆后面','黄色菜花里','云朵里'],ans:2,exp:'"飞入菜花无处寻"——飞进菜花丛，黄蝶与黄花颜色一样，所以找不到了。'},
  {q:'这首诗主要描写了什么？',opts:['丰收的快乐','春天田园风光和儿童追蝶的趣事','农民辛苦劳动','离家思乡'],ans:1,exp:'篱笆、小路、蝴蝶、儿童追蝶，生动展现了春天田园的美丽与童趣。'}
];
let chIdx = 0, chScore = 0, chAns = false;

/* ==============================
   工具
   ============================== */
const $ = id => document.getElementById(id);

function confirmName(){
  const n = $('nameInp').value.trim();
  if(!n){ $('nameInp').classList.add('err'); $('nameInp').focus(); setTimeout(()=>$('nameInp').classList.remove('err'),600); return; }
  playerName = n; startGame();
}
document.addEventListener('DOMContentLoaded',()=>{
  $('nameInp').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmName(); });
});

function startGame(){
  const n = $('nameInp').value.trim();
  if(n) playerName = n;
  if(!playerName){ $('nameInp').classList.add('err'); $('nameInp').focus(); return; }
  $('welcome').style.display = 'none';
  $('game').style.display = 'block';
  $('playerShow').textContent = playerName;
  renderLv(0);
  updProg();
}

function updProg(){
  const done = lvDone.filter(Boolean).length;
  const pct = Math.round(done/4*100);
  $('progFill').style.width = pct+'%';
  $('progText').textContent = `闯关进度：${pct}%（${done}/4 关完成）`;
}

function updTabs(){
  for(let i=0;i<4;i++){
    const t = $('tab'+i);
    t.classList.remove('active','done','locked');
    const ch = t.querySelector('.t-check'); if(ch) ch.remove();
    if(i===curLv) t.classList.add('active');
    else if(lvDone[i]){
      t.classList.add('done');
      const s=document.createElement('span'); s.className='t-check'; s.textContent='✓'; t.appendChild(s);
    } else if(i>0 && !lvDone[i-1]) t.classList.add('locked');
  }
}

function goTab(i){
  if(i>curLv && !lvDone[i-1]) return;
  curLv = i; renderLv(i);
}

function floatScore(txt, ok){
  const el = document.createElement('div');
  el.className = 'float-score'+(ok?'':' neg');
  el.textContent = txt;
  el.style.cssText = `left:${30+Math.random()*40}%;top:${35+Math.random()*25}%`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

function launchConfetti(){
  const wrap = $('confetti-wrap');
  const emos = ['🌸','🦋','🌼','✨','🌿','⭐','💛','🎉','🌺','🍀'];
  for(let i=0;i<24;i++){
    const el=document.createElement('div'); el.className='cf-item';
    el.textContent=emos[Math.floor(Math.random()*emos.length)];
    el.style.cssText=`left:${Math.random()*100}%;animation-delay:${Math.random()*.7}s;animation-duration:${1.5+Math.random()*.8}s;font-size:${14+Math.random()*14}px`;
    wrap.appendChild(el);
    setTimeout(()=>el.remove(),2800);
  }
}

/* ==============================
   排行榜
   ============================== */
const LB_KEY = 'xgd_lb_v2';
function getLB(){ try{ return JSON.parse(localStorage.getItem(LB_KEY))||[]; }catch(e){ return []; } }
function saveLB(name,score,stars){
  let lb=getLB();
  const idx=lb.findIndex(r=>r.name===name);
  const e={name,score,stars,time:Date.now()};
  if(idx>=0){ if(score>=lb[idx].score) lb[idx]=e; }
  else lb.push(e);
  lb.sort((a,b)=>b.score-a.score); lb=lb.slice(0,20);
  localStorage.setItem(LB_KEY,JSON.stringify(lb));
  return lb;
}
function starsOf(s){ return s>=88?3:s>=66?2:s>=44?1:0; }

/* ==============================
   渲染关卡分发
   ============================== */
function renderLv(i){
  curLv=i; updTabs();
  const a=$('lvArea');
  if(i===0) renderLv1(a);
  else if(i===1) renderLv2(a);
  else if(i===2) renderLv3(a);
  else if(i===3) renderLv4(a);
}

/* ==============================
   关卡一：视频观看
   ============================== */
function renderLv1(a){
  a.innerHTML = `
  <div class="card">
    <div class="q-no">第一关 · 观看古诗视频 🎬</div>
    <div class="q-txt">先看一看古诗视频，再回答问题！</div>
    <div class="video-tip">
      <div class="vt-icon">💡</div>
      <div>先完整观看视频，注意诗的内容和画面，然后完成下方打卡！</div>
    </div>
    <div class="video-wrap" id="videoWrap">
      <video id="poemVideo" controls playsinline webkit-playsinline preload="metadata"
        style="width:100%;display:block;max-height:280px;background:#000"
        ontimeupdate="onVideoProgress()"
        onended="onVideoEnd()">
        <source src="《宿新市徐公店》.mp4" type="video/mp4">
        <p style="color:#fff;padding:16px;font-size:13px;text-align:center">⚠️ 视频加载失败，请确保HTML与视频文件在同一文件夹中。</p>
      </video>
      <div class="video-badge" id="videoBadge">🎬 古诗视频</div>
      <div class="video-progress-bar"><div class="video-progress-fill" id="videoProgFill"></div></div>
    </div>

    <div style="text-align:center;margin-top:14px">
      <div style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px">
        📋 观看打卡
      </div>
      <div id="watchJudge">
        <p style="font-size:15px;font-weight:800;color:var(--text);margin-bottom:14px">
          你认真观看完古诗视频了吗？
        </p>
        <div class="judge-opts">
          <div class="j-btn" id="jvYes" onclick="answerWatch(true)">
            <span class="j-emoji">⭕</span>
            <div class="j-text">已看完了！</div>
          </div>
          <div class="j-btn" id="jvNo" onclick="answerWatch(false)">
            <span class="j-emoji">❌</span>
            <div class="j-text">还没看完</div>
          </div>
        </div>
        <div class="j-result" id="watchResult"></div>
      </div>
    </div>
  </div>`;
}

let videoWatched = false;
function onVideoProgress(){
  const v = $('poemVideo');
  if(!v||!v.duration) return;
  const pct = v.currentTime/v.duration*100;
  const fill = $('videoProgFill');
  if(fill) fill.style.width = pct+'%';
  if(pct >= 80) videoWatched = true;
}
function onVideoEnd(){ videoWatched = true; }

function answerWatch(val){
  const yBtn=$('jvYes'), nBtn=$('jvNo'), res=$('watchResult');
  yBtn.onclick=null; nBtn.onclick=null;
  if(val){
    yBtn.classList.add('correct-ans');
    lvScores[0] = 20;
    floatScore('+20分 🎬', true);
    launchConfetti();
    res.innerHTML='<span class="ri">🎉</span>太棒了！认真看视频是学好古诗的第一步！继续加油！';
    res.className='j-result show ok';
    setTimeout(()=>showLvClear(0,20,'看视频打卡完成！满分！',()=>{}),1600);
  } else {
    nBtn.classList.add('wrong-ans');
    res.innerHTML='<span class="ri">📺</span>没关系！把视频看完再来打卡吧，看完后点"已看完了"获得满分！';
    res.className='j-result show fail';
    // 滚回视频
    const v=$('poemVideo'); if(v) v.scrollIntoView({behavior:'smooth',block:'center'});
    // 3秒后重置按钮让重新选
    setTimeout(()=>{
      yBtn.onclick=()=>answerWatch(true); nBtn.onclick=()=>answerWatch(false);
      yBtn.classList.remove('correct-ans','wrong-ans'); nBtn.classList.remove('correct-ans','wrong-ans');
      res.className='j-result';
    },3000);
  }
}

/* ==============================
   关卡二：朗读跟读
   ============================== */
function renderLv2(a){
  let html = `
  <div class="card">
    <div class="q-no">第二关 · 朗读跟读打卡 🎤</div>
    <div class="q-txt">听一听、读一读，完成3个朗读任务！</div>
    <div class="read-poem-bg">
      <div class="rp-label">📖 宿新市徐公店 · 宋·杨万里</div>
      <div class="rp-lines">
        <span>篱落疏疏一径深，</span>
        <span>树头花落未成阴。</span>
        <span>儿童急走追黄蝶，</span>
        <span>飞入菜花无处寻。</span>
      </div>
      <div class="rp-author">七言绝句 · 2-2-3 节奏</div>
    </div>
    <div class="read-tip-banner">
      🌟 <strong>朗读提示：</strong>七言诗读作"篱落/疏疏/一径深"，注意"急走"要读得有点急促，感受小孩追蝴蝶的欢乐！
    </div>
    <div class="read-tasks" id="rdTasks">
      ${READ_TASKS.map((t,i)=>buildRdTask(t,i)).join('')}
    </div>
  </div>`;
  a.innerHTML = html;
  // 恢复已完成的任务
  for(let i=0;i<3;i++){ if(rdDone[i]) markRdDone(i, rdStars[i], false); }
  checkRd2Clear();
}

function buildRdTask(t,i){
  const linesHtml = t.lines.split('\n').map(l=>`<div>${l}</div>`).join('');
  return `
  <div class="r-task" id="rdT${i}">
    <div class="r-num" id="rdN${i}">${i+1}</div>
    <div class="r-info">
      <h4>${t.title}</h4>
      <p>${t.desc}</p>
      <div class="r-lines" id="rdL${i}">${linesHtml}</div>
      <div class="r-timer" id="rdTimer${i}"></div>
      <div class="r-waves" id="rdWave${i}">
        <div class="r-wave"></div><div class="r-wave"></div><div class="r-wave"></div>
        <div class="r-wave"></div><div class="r-wave"></div>
      </div>
    </div>
    <div class="r-action">
      <button class="mic-btn idle" id="rdMic${i}" onclick="toggleRec(${i})">🎤</button>
    </div>
  </div>`;
}

function toggleRec(i){
  if(rdDone[i]) return;
  if(rdRec[i]===0) stopRec(i); else startRec(i);
}
function startRec(i){
  rdRec[i]=0; rdLeft[i]=READ_TASKS[i].time;
  const mic=$(`rdMic${i}`), timer=$(`rdTimer${i}`), wave=$(`rdWave${i}`);
  mic.className='mic-btn rec'; mic.innerHTML='⏹️<div class="mic-ring"></div>';
  timer.style.display='block'; timer.textContent=`🔴 ${rdLeft[i]}s`;
  wave.classList.add('on');
  rdTimers[i]=setInterval(()=>{
    rdLeft[i]--;
    timer.textContent=`🔴 ${rdLeft[i]}s`;
    if(rdLeft[i]<=0) stopRec(i);
  },1000);
}
function stopRec(i){
  if(rdTimers[i]){ clearInterval(rdTimers[i]); rdTimers[i]=null; }
  rdRec[i]=1;
  const mic=$(`rdMic${i}`), timer=$(`rdTimer${i}`), wave=$(`rdWave${i}`);
  mic.className='mic-btn done'; mic.innerHTML='✅';
  timer.style.display='none'; wave.classList.remove('on');
  const ratio=(READ_TASKS[i].time-rdLeft[i])/READ_TASKS[i].time;
  rdStars[i] = ratio>=.85?3:ratio>=.5?2:1;
  rdDone[i]=true;
  markRdDone(i, rdStars[i], true);
  checkRd2Clear();
}
function markRdDone(i, stars, animate){
  const task=$(`rdT${i}`), num=$(`rdN${i}`);
  if(task) task.classList.add('done-task');
  if(num) num.textContent='✓';
  const mic=$(`rdMic${i}`); if(mic){ mic.className='mic-btn done'; mic.innerHTML='✅'; }
  const linesEl=$(`rdL${i}`);
  if(linesEl && !linesEl.querySelector('.r-star-result')){
    const msgs=['继续加油！','朗读不错！','棒极了！'];
    const div=document.createElement('div'); div.className='r-star-result';
    if(animate) div.style.animation='bounceIn .5s ease';
    div.innerHTML=`${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)} <span>${msgs[stars-1]}</span>`;
    linesEl.appendChild(div);
  }
}
function checkRd2Clear(){
  if(!rdDone.every(Boolean)) return;
  const total=rdStars.reduce((a,b)=>a+b,0);
  const score = total>=8?25:total>=6?21:total>=4?17:13;
  lvScores[1]=score;
  if(!lvDone[1]){
    lvDone[1]=true; updProg();
    showLvClear(1, score, '朗读打卡通关！', launchConfetti);
  }
}

/* ==============================
   关卡三：判断题
   ============================== */
function renderLv3(a){
  jdIdx=0; jdScore=0; jdAns=false;
  a.innerHTML=''; renderJdQ(a);
}
function renderJdQ(a){
  if(jdIdx>=JUDGE_QS.length){
    lvScores[2]=jdScore;
    if(!lvDone[2]){ lvDone[2]=true; updProg(); }
    showLvClear(2, jdScore, `答对了 ${Math.round(jdScore/4)} 题！`, launchConfetti);
    return;
  }
  const q=JUDGE_QS[jdIdx]; jdAns=false;
  a.innerHTML=`
  <div class="card">
    <div class="q-no">第三关 · 判断题 ${jdIdx+1}/${JUDGE_QS.length}</div>
    <div class="q-txt">${q.q}</div>
    <div class="judge-opts">
      <div class="j-btn" id="jT" onclick="ansJd(true)"><span class="j-emoji">⭕</span><div class="j-text">正确</div></div>
      <div class="j-btn" id="jF" onclick="ansJd(false)"><span class="j-emoji">❌</span><div class="j-text">错误</div></div>
    </div>
    <div class="j-result" id="jdRes"></div>
  </div>`;
}
function ansJd(val){
  if(jdAns) return; jdAns=true;
  const q=JUDGE_QS[jdIdx], ok=(val===q.ans);
  const jT=$('jT'), jF=$('jF'), res=$('jdRes');
  jT.onclick=null; jF.onclick=null;
  if(ok){
    (val?jT:jF).classList.add('correct-ans');
    jdScore+=4; floatScore('+4分 ✓', true);
    res.innerHTML=`<span class="ri">🎉</span>答对了！${q.exp}`;
    res.className='j-result show ok';
  } else {
    (val?jT:jF).classList.add('wrong-ans');
    (q.ans?jT:jF).classList.add('reveal');
    floatScore('再想想！', false);
    res.innerHTML=`<span class="ri">💡</span>答错了～正确是【${q.ans?'正确':'错误'}】。${q.exp}`;
    res.className='j-result show fail';
  }
  setTimeout(()=>{ jdIdx++; renderJdQ($('lvArea')); }, 1800);
}

/* ==============================
   关卡四：选择题
   ============================== */
function renderLv4(a){
  chIdx=0; chScore=0; chAns=false;
  a.innerHTML=''; renderChQ(a);
}
function renderChQ(a){
  if(chIdx>=CHOICE_QS.length){
    lvScores[3]=chScore;
    if(!lvDone[3]){ lvDone[3]=true; updProg(); }
    showLvClear(3, chScore, `答对了 ${Math.round(chScore/5)} 题！全部通关！`, ()=>{ launchConfetti(); setTimeout(showFinish, 2400); });
    return;
  }
  const q=CHOICE_QS[chIdx]; chAns=false;
  const keys=['A','B','C','D'];
  const optsHtml=q.opts.map((o,i)=>`
    <div class="c-opt" id="co${i}" onclick="ansCh(${i})">
      <div class="c-key">${keys[i]}</div><span>${o}</span>
    </div>`).join('');
  a.innerHTML=`
  <div class="card">
    <div class="q-no">第四关 · 选择题 ${chIdx+1}/${CHOICE_QS.length}</div>
    <div class="q-txt">${q.q}</div>
    <div class="choice-opts">${optsHtml}</div>
    <div class="j-result" id="chRes"></div>
  </div>`;
}
function ansCh(i){
  if(chAns) return; chAns=true;
  const q=CHOICE_QS[chIdx], ok=(i===q.ans);
  const keys=['A','B','C','D'], res=$('chRes');
  for(let k=0;k<q.opts.length;k++){ const el=$('co'+k); if(el) el.onclick=null; }
  if(ok){
    $('co'+i).classList.add('correct');
    chScore+=5; floatScore('+5分 ✓', true);
    res.innerHTML=`<span class="ri">🎉</span>选对了！${q.exp}`;
    res.className='j-result show ok';
  } else {
    $('co'+i).classList.add('wrong');
    $('co'+q.ans).classList.add('reveal-c');
    floatScore('再想想！', false);
    res.innerHTML=`<span class="ri">💡</span>答错了～正确是【${keys[q.ans]}. ${q.opts[q.ans]}】。${q.exp}`;
    res.className='j-result show fail';
  }
  setTimeout(()=>{ chIdx++; renderChQ($('lvArea')); }, 2000);
}

/* ==============================
   关卡通关卡
   ============================== */
function showLvClear(lv, score, msg, cb){
  const a=$('lvArea');
  const nextLabel=['前往第二关 🎤','前往第三关 ✅','前往第四关 🎯','查看总成绩 🏆'][lv];
  const nextFn = lv<3 ? `gotoLv(${lv+1})` : `showFinish()`;
  const icons=['🎬','🎤','✅','🎯'];
  const pct = score / (lv===0?20:lv===1?25:lv===2?32:30);
  const stars = pct>=.9?3:pct>=.65?2:1;
  const starStr='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  const div=document.createElement('div');
  div.className='lv-clear show';
  div.innerHTML=`
    <span class="lc-icon">${icons[lv]}</span>
    <h2>第${lv+1}关通关！</h2>
    <div class="lc-stars">${starStr}</div>
    <div class="lc-score">+${score}分</div>
    <p>${msg}</p>
    <button class="next-btn" onclick="${nextFn}">${nextLabel}</button>`;
  a.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'nearest'});
  // 标签更新
  const tab=$('tab'+lv);
  tab.classList.remove('active','locked');
  tab.classList.add('done');
  if(!tab.querySelector('.t-check')){
    const ch=document.createElement('span');ch.className='t-check';ch.textContent='✓';tab.appendChild(ch);
  }
  if(lv<3) $('tab'+(lv+1)).classList.remove('locked');
  updProg();
  if(cb) cb();
}

function gotoLv(i){
  curLv=i; renderLv(i);
  $('game').scrollIntoView({behavior:'smooth'});
}

/* ==============================
   完成屏
   ============================== */
function showFinish(){
  $('game').style.display='none';
  const fin=$('finish'); fin.style.display='block';
  const total=lvScores.reduce((a,b)=>a+b,0); // 满分 20+25+32+30=107，显示时按比例转100
  const display=Math.min(100,Math.round(total/1.07));
  const stars=starsOf(display);
  const starStr='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  saveLB(playerName,display,stars);
  launchConfetti();
  const msgs=['太厉害了！诗词小达人！🎉','非常棒！继续保持！🌟','做得不错！多练几遍更好！💪','加油！多读多练！📖'];
  fin.innerHTML=`
  <div class="fin-hero">
    <span class="fin-butterfly">🦋</span>
    <h1>全部通关！</h1>
    <div class="fin-score">${display}</div>
    <div class="fin-stars">${starStr}</div>
    <p class="fin-msg">${msgs[3-Math.min(3,stars)]}</p>
  </div>

  <div class="fin-breakdown">
    <h3>📊 各关得分</h3>
    <div class="bd-row"><div class="bd-name">🎬 第一关：观看视频</div><div class="bd-score">${lvScores[0]}分</div></div>
    <div class="bd-row"><div class="bd-name">🎤 第二关：朗读打卡</div><div class="bd-score">${lvScores[1]}分</div></div>
    <div class="bd-row"><div class="bd-name">✅ 第三关：判断题</div><div class="bd-score">${lvScores[2]}分</div></div>
    <div class="bd-row"><div class="bd-name">🎯 第四关：选择题</div><div class="bd-score">${lvScores[3]}分</div></div>
    <div class="bd-row bd-total"><div class="bd-name">🏆 综合得分</div><div class="bd-score">${display}分</div></div>
  </div>

  ${buildLB(display)}

  <div class="fin-btns">
    <button class="fin-btn primary" onclick="retryAll()">🔄 再闯一次</button>
    <button class="fin-btn sec" onclick="shareScore(${display},'${starStr}')">📢 分享</button>
  </div>

  <div class="study-tips">
    <h3>📚 学习小贴士</h3>
    <div class="tip-item"><div class="tip-icon">✍️</div>
      <div class="tip-text"><strong>易错字：</strong>"篱"左边是礻旁；"疏"右边是"疋"；"蝶"是虫旁；"径"是彳旁。</div></div>
    <div class="tip-item"><div class="tip-icon">💡</div>
      <div class="tip-text"><strong>古今异义：</strong>"走"在古文里是"跑"的意思，"急走追黄蝶"就是飞奔去追蝴蝶。</div></div>
    <div class="tip-item"><div class="tip-icon">🌸</div>
      <div class="tip-text"><strong>诗的妙处：</strong>黄蝴蝶飞进黄菜花，颜色一样找不到了——这是这首诗最有趣的意境！</div></div>
    <div class="tip-item"><div class="tip-icon">🎵</div>
      <div class="tip-text"><strong>朗读节奏：</strong>篱落/疏疏/一径深，树头/花落/未成阴。儿童/急走/追黄蝶，飞入/菜花/无处寻。</div></div>
  </div>`;
  fin.scrollIntoView({behavior:'smooth'});
}

function buildLB(myScore){
  const lb=getLB();
  if(!lb.length) return `<div class="leaderboard"><h3>🏆 本机排行榜</h3><div class="lb-empty">你是第一个闯关的勇士！</div></div>`;
  const medals=['🥇','🥈','🥉'];
  const rows=lb.slice(0,10).map((r,i)=>{
    const isMe=(r.name===playerName&&r.score===myScore);
    const rank=i<3?`<span class="lb-rank ${['gold','silver','bronze'][i]}">${medals[i]}</span>`:`<span class="lb-rank num">${i+1}</span>`;
    return `<div class="lb-row ${isMe?'me':''}" style="animation-delay:${i*.05}s">
      ${rank}
      <div class="lb-name">${r.name}${isMe?'<span class="lb-me-tag">我</span>':''}</div>
      <div class="lb-stars">${'⭐'.repeat(r.stars||0)}</div>
      <div class="lb-score">${r.score}分</div>
    </div>`;
  }).join('');
  return `<div class="leaderboard"><h3>🏆 本机排行榜</h3>${rows}</div>`;
}

function retryAll(){
  lvScores=[0,0,0,0]; lvDone=[false,false,false,false]; curLv=0;
  rdDone=[false,false,false]; rdRec=[-1,-1,-1];
  rdTimers.forEach(t=>{ if(t) clearInterval(t); }); rdTimers=[null,null,null];
  rdLeft=[0,0,0]; rdStars=[0,0,0];
  jdIdx=0;jdScore=0;jdAns=false;
  chIdx=0;chScore=0;chAns=false;
  videoWatched=false;
  $('finish').style.display='none'; $('finish').innerHTML='';
  $('game').style.display='block';
  for(let i=0;i<4;i++){
    const t=$('tab'+i); t.classList.remove('active','done','locked');
    const ch=t.querySelector('.t-check'); if(ch) ch.remove();
    if(i>0) t.classList.add('locked');
  }
  $('tab0').classList.add('active');
  updProg(); renderLv(0);
  $('game').scrollIntoView({behavior:'smooth'});
}

function shareScore(score,stars){
  const txt=`我在《宿新市徐公店》古诗四关闯关中获得了${score}分 ${stars}！快来挑战吧！`;
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>alert('✅ 已复制，分享给同学吧！')); }
  else { prompt('复制分享给同学：',txt); }
}
</script>
